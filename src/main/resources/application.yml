spring:
  application:
    name: assembly-voting-api

  datasource:
    url: jdbc:h2:file:./data/assembly-voting-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

cpf:
  validation:
    url: https://user-info.herokuapp.com
