spring:
  application:
    name: assembly-voting-api

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:./data/assembly-voting-db
    driver-class-name: org.h2.Driver
    username: sa
    password:jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

  # Date format
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss

  mvc:
    format:
      date-time: yyyy-MM-dd'T'HH:mm:ss

# Feign
cpf:
  validation:
    url: https://user-info.herokuapp.com
